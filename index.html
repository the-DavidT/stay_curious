<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Stay Curious</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b27;
    --gold: #e8b84b;
    --gold-soft: #f3d27e;
    --text: #e8eaf0;
    --muted: #9aa3b5;
    --error: #ff7b72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1b2336 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  /* ---------- password gate ---------- */
  #gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate-card {
    background: var(--card);
    border: 1px solid #2a3245;
    border-radius: 18px;
    padding: 44px 36px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  .trophy {
    width: 72px;
    height: 72px;
    margin: 0 auto 18px;
    filter: drop-shadow(0 4px 14px rgba(232,184,75,0.35));
    animation: float 3.5s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  .gate-card h1 {
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .gate-card .sub {
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.5;
    margin-bottom: 26px;
  }
  .gate-card form { display: flex; flex-direction: column; gap: 12px; }
  .gate-card input {
    background: #0d1220;
    border: 1px solid #2a3245;
    border-radius: 10px;
    color: var(--text);
    font-size: 1.05rem;
    padding: 13px 16px;
    text-align: center;
    letter-spacing: 0.12em;
    outline: none;
    transition: border-color 0.2s;
  }
  .gate-card input:focus { border-color: var(--gold); }
  .gate-card button {
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    border: none;
    border-radius: 10px;
    color: #2a2008;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 13px;
    transition: transform 0.12s, filter 0.2s;
  }
  .gate-card button:hover { filter: brightness(1.06); }
  .gate-card button:active { transform: scale(0.98); }
  .gate-card button:disabled { filter: grayscale(0.6); cursor: wait; }
  #gate-error {
    color: var(--error);
    font-size: 0.88rem;
    min-height: 1.2em;
  }

  /* ---------- gallery ---------- */
  #gallery { display: none; padding: 0 0 80px; }
  header.hero {
    text-align: center;
    padding: 64px 24px 26px;
  }
  header.hero .trophy { width: 84px; height: 84px; }
  header.hero h1 {
    font-size: clamp(1.7rem, 4.5vw, 2.6rem);
    letter-spacing: 0.03em;
  }
  header.hero p {
    color: var(--muted);
    max-width: 620px;
    margin: 14px auto 0;
    line-height: 1.65;
    font-size: 1.02rem;
  }
  .divider {
    width: 64px;
    height: 3px;
    background: var(--gold);
    border-radius: 2px;
    margin: 22px auto 0;
  }
  section.album { max-width: 1080px; margin: 48px auto 0; padding: 0 20px; }
  section.album h2 {
    font-size: 1.35rem;
    color: var(--gold-soft);
    letter-spacing: 0.05em;
  }
  section.album .subtitle {
    color: var(--muted);
    font-size: 0.92rem;
    margin: 4px 0 18px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .grid img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid #2a3245;
    cursor: zoom-in;
    opacity: 0;
    transition: opacity 0.5s, transform 0.25s;
  }
  .grid img.loaded { opacity: 1; }
  .grid img:hover { transform: scale(1.015); }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 70px;
  }

  /* ---------- lightbox ---------- */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,8,14,0.93);
    z-index: 50;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    padding: 24px;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="trophy-icon" viewBox="0 0 64 64">
    <path fill="#e8b84b" d="M20 8h24v4h8a2 2 0 0 1 2 2c0 8-5 14-11 15.4A13 13 0 0 1 34 38v6h6a3 3 0 0 1 3 3v3h4v6H17v-6h4v-3a3 3 0 0 1 3-3h6v-6a13 13 0 0 1-9-8.6C15 28 10 22 10 14a2 2 0 0 1 2-2h8V8zm-5.8 8c.5 4.6 3 8.4 6.3 9.9A24 24 0 0 1 20 16h-5.8zm35.6 0H44a24 24 0 0 1-.5 9.9c3.3-1.5 5.8-5.3 6.3-9.9z"/>
    <path fill="#f3d27e" d="M24 12h16v6a16 16 0 0 1-3.2 10.4A8.9 8.9 0 0 1 32 31a8.9 8.9 0 0 1-4.8-2.6A16 16 0 0 1 24 18v-6z"/>
  </symbol>
</svg>

<div id="gate">
  <div class="gate-card">
    <svg class="trophy"><use href="#trophy-icon"/></svg>
    <h1>כל הכבוד!</h1>
    <p class="sub">מצאתם את הסוד שמאחורי הגביע.<br>
       הזינו את הסיסמה כדי לפתוח את הזכרונות.</p>
    <form id="gate-form">
      <input id="password" type="password" placeholder="סיסמה"
             autocomplete="off" autocapitalize="off" spellcheck="false" required>
      <button id="unlock-btn" type="submit">פתיחה</button>
      <div id="gate-error"></div>
    </form>
  </div>
</div>

<div id="gallery">
  <header class="hero">
    <svg class="trophy"><use href="#trophy-icon"/></svg>
    <h1 id="hero-title"></h1>
    <p>
      תזכרו את הדרך שעברתם, למרות מלחמה ומכשולים רבים.
    </p>
    <p style="color: var(--gold-soft); font-size: 1.25rem; font-weight: 700; margin-top: 16px;">
      גאה בכם!
    </p>
    <div class="divider"></div>
  </header>
  <div id="albums"></div>
  <footer>החבר שלכם,<br>דויד</footer>
</div>

<div id="lightbox"><img id="lightbox-img" alt=""></div>

<script>
const PBKDF2_ITERATIONS = 310000;
const enc = new TextEncoder();
const $ = (id) => document.getElementById(id);

async function deriveKey(password, salt) {
  const material = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: PBKDF2_ITERATIONS, hash: "SHA-256" },
    material, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
}

function decrypt(key, iv, ciphertext) {
  return crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
}

async function fetchBytes(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error("fetch failed: " + path);
  return new Uint8Array(await res.arrayBuffer());
}

let aesKey = null;

$("gate-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("unlock-btn");
  const errEl = $("gate-error");
  btn.disabled = true;
  btn.textContent = "פותח...";
  errEl.textContent = "";
  try {
    const blob = await fetchBytes("assets/manifest.enc");
    const salt = blob.slice(0, 16);
    const iv = blob.slice(16, 28);
    const ct = blob.slice(28);
    aesKey = await deriveKey($("password").value, salt);
    const manifestBytes = await decrypt(aesKey, iv, ct);
    const manifest = JSON.parse(new TextDecoder().decode(manifestBytes));
    showGallery(manifest);
  } catch {
    errEl.textContent = "זו לא הסיסמה. נסו שוב.";
    btn.disabled = false;
    btn.textContent = "פתיחה";
  }
});

function showGallery(manifest) {
  $("gate").style.display = "none";
  $("gallery").style.display = "block";
  if (manifest.hero && manifest.hero.title) {
    $("hero-title").textContent = manifest.hero.title;
    document.title = manifest.hero.title;
  }
  const albums = $("albums");
  for (const section of manifest.sections) {
    const sec = document.createElement("section");
    sec.className = "album";
    const h2 = document.createElement("h2");
    h2.textContent = section.title;
    const sub = document.createElement("p");
    sub.className = "subtitle";
    sub.textContent = section.subtitle || "";
    const grid = document.createElement("div");
    grid.className = "grid";
    sec.append(h2, sub, grid);
    albums.append(sec);
    for (const image of section.images) loadImage(image, grid);
  }
}

async function loadImage(image, grid) {
  const img = document.createElement("img");
  img.alt = "";
  grid.append(img);
  try {
    const blob = await fetchBytes("assets/" + image.file);
    const iv = blob.slice(0, 12);
    const bytes = await decrypt(aesKey, iv, blob.slice(12));
    const url = URL.createObjectURL(new Blob([bytes], { type: image.type }));
    img.src = url;
    img.onload = () => img.classList.add("loaded");
    img.onclick = () => {
      $("lightbox-img").src = url;
      $("lightbox").classList.add("open");
    };
  } catch {
    img.remove();
  }
}

$("lightbox").onclick = () => $("lightbox").classList.remove("open");
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") $("lightbox").classList.remove("open");
});
</script>
</body>
</html>
